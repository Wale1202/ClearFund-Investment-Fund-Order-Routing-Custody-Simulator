spring:
  application:
    name: clearfund

  datasource:
    url: jdbc:postgresql://localhost:5432/clearfund
    username: clearfund
    password: clearfund
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only verifies the entity mappings
      # match the migrated tables.
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080

logging:
  level:
    com.clearfund: DEBUG
    org.hibernate.SQL: DEBUG

clearfund:
  settlement:
    # Trade date + N business-day(s) settlement simulation (T+2).
    offset-days: 2
